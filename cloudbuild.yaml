steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--build-arg"
      - "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${_NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}"
      - "--build-arg"
      - "NEXT_PUBLIC_APP_URL=${_NEXT_PUBLIC_APP_URL}"
      - "-t"
      - "us-central1-docker.pkg.dev/${PROJECT_ID}/rescuegrid/rescuegrid-ai"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "us-central1-docker.pkg.dev/${PROJECT_ID}/rescuegrid/rescuegrid-ai"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "rescuegrid-ai"
      - "--image=us-central1-docker.pkg.dev/${PROJECT_ID}/rescuegrid/rescuegrid-ai"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--set-secrets=GEMINI_API_KEY=gemini-api-key:latest,GOOGLE_MAPS_API_KEY=maps-api-key:latest,GOOGLE_CLOUD_PROJECT_ID=gcp-project-id:latest"
      - "--cpu-boost"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--memory=1Gi"
      - "--cpu=2"
      - "--port=8080"
      - "--timeout=300s"

substitutions:
  _NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ""
  _NEXT_PUBLIC_APP_URL: ""

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - "us-central1-docker.pkg.dev/${PROJECT_ID}/rescuegrid/rescuegrid-ai"

timeout: 900s
